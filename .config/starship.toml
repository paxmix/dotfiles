# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

palette = "onedark_darker"

[palettes.onedark_darker]
black = "#1e1e1e"
bg0 = "#21252b"
bg1 = "#282c34"
bg2 = "#2c323c"
bg3 = "#353b45"
fg = "#abb2bf"
fg_bright = "#c8ccd4"
comment = "#5c6370"
cursor = "#528bff"
red = "#e06c75"
orange = "#d19a66"
yellow = "#e5c07b"
green = "#98c379"
cyan = "#56b6c2"
blue = "#61afef"
purple = "#c678dd"
# Optional "darker" tweaks for depth (used as background transitions)
surface0 = "#1b1d23"
surface1 = "#21252b"
surface2 = "#2a2e36"
surface3 = "#323842"

