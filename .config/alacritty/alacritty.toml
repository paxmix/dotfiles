[general]
import = ["~/.config/alacritty/tokyonight_night.toml"]

[env]
TERM = "xterm-256color"

[font]
size = 14.0

[font.bold]
family = "SauceCodePro Nerd Font"
style = "Bold"

[font.bold_italic]
family = "SauceCodePro Nerd Font"
style = "Bold Italic"

[font.italic]
family = "SauceCodePro Nerd Font"
style = "Italic"

[font.normal]
family = "SauceCodePro Nerd Font"
style = "Regular"

[window]
padding = { x = 5, y = 5 }
startup_mode = "Maximized"
dynamic_title = false

[terminal]
shell = "fish"

[mouse]
hide_when_typing = true

[keyboard]
bindings = [{ key = "Q", mods = "Control|Shift", action = "Quit" }]
