# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME

shell /usr/bin/fish

# font_size 14
# font_family FiraCode Nerd Font
# font_features FiraCodeNF-Reg +cv01 +cv02 +cv06 +ss05 +ss03 +ss02

# font_size 14
# font_family JetBrainsMono Nerd Font
# font_features JetBrainsMonoNF-Regular +zero +cv07 +cv11 +vc17

font_size 15
font_family IosevkaTerm Nerd Font
font_features IosevkaTermNF +cv36=14 +cv44=8 +cv47=8 +cv55=8 +cv59=13 +VSAJ=2

window_margin_width 5
enable_audio_bell no
confirm_os_window_close 0
# hide_window_decorations yes

placement_strategy top

cursor_blink_interval 0
# cursor_trail 10
# cursor_trail_start_threshold 5
# cursor_trail_decay 0.01 0.4

scrollback_lines 10000

map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+q close_os_window
