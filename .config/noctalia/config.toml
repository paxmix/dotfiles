[bar.default]
end = [ "tray", "notifications", "clipboard", "network", "volume", "brightness", "session" ]
font_weight = 400
shadow = false
start = [ "workspaces" ]
thickness = 30
widget_spacing = 16

[brightness]
enable_ddcutil = true

[calendar.account.manh1998nb]
type = "google"

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "caffeine"

[[control_center.shortcuts]]
type = "nightlight"

[[control_center.shortcuts]]
type = "notification"

[[control_center.shortcuts]]
type = "power_profile"

[[control_center.shortcuts]]
type = "dark_mode"

[dock]
shadow = false

[location]
address = "Vientiane"

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [ "lockscreen-login-box@HDMI-A-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[nightlight]
enabled = true
temperature_night = 4500

[shell]
font_family = "Adwaita Sans"
polkit_agent = true

    [shell.panel]
    shadow = false

    [shell.screenshot]
    confirm_region = true
    directory = "/home/paxmix/Pictures/Screenshots"

[system.monitor]
enabled = false

[theme]
builtin = "Catppuccin"

    [theme.templates]
    builtin_ids = [ "mango" ]

[wallpaper]
directory = "/home/paxmix/Pictures/Wallpapers"

    [wallpaper.default]
    path = "/home/paxmix/Pictures/Wallpapers/black-hole.png"

    [wallpaper.last]
    path = "/home/paxmix/Pictures/Wallpapers/black-hole.png"

[widget.clock]
font_family = "Adwaita Sans"
font_weight = 600
format = "{:%I:%M %p %A, %d/%m/%Y}"
