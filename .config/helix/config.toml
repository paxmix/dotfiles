theme = "gruvbox-material"

[editor]
line-number = "relative"
bufferline = "multiple"
cursorline = true
scrolloff = 5
color-modes = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.soft-wrap]
enable = true

[editor.indent-guides]
render = true
character = "╎"
skip-levels = 1

[keys.insert]
j = { k = "normal_mode" }

[keys.normal]
"}" = "goto_next_paragraph"
"{" = "goto_prev_paragraph"

[keys.select]
"}" = "goto_next_paragraph"
"{" = "goto_prev_paragraph"
